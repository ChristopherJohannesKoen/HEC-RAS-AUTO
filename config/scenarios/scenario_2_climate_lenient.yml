scenario_id: "scenario_2_lenient"
title: "Climate Intensification - Lenient"
flow_multiplier_upstream: 1.15
flow_multiplier_tributary: 1.15
rationale: >
  Scenario 2 lenient tier scales the baseline 1:100-year peak discharges by 15%
  while preserving the finalized HEC-RAS geometry, roughness, and plan setup.
