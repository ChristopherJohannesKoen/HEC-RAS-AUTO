scenario_id: "scenario_2"
title: "Climate Intensification"
primary_tier: "average"
tier_order: ["lenient", "average", "conservative"]
tiers:
  - tier_id: "lenient"
    label: "Lenient"
    flow_multiplier_upstream: 1.15
    flow_multiplier_tributary: 1.15
  - tier_id: "average"
    label: "Average"
    flow_multiplier_upstream: 1.30
    flow_multiplier_tributary: 1.30
  - tier_id: "conservative"
    label: "Conservative"
    flow_multiplier_upstream: 1.60
    flow_multiplier_tributary: 1.60
physical_mechanism: >
  A warmer atmosphere can hold more moisture and increases heavy-rainfall potential;
  design-event rainfall intensities are therefore treated as non-stationary.
assumptions:
  - "Steady 1D HEC-RAS scenario; geometry and roughness remain unchanged for Scenario 2."
  - "Peak-flow climate impact is represented with multiplicative scaling of baseline 1:100 discharges."
  - "The same climate factor is applied to main stem and tributary inflow for assignment-level consistency."
limitations:
  - "No rainfall-runoff nonlinearity is modeled explicitly."
  - "No unsteady timing/routing effects at the confluence are modeled."
  - "Catchment-specific differences between tributary and main stem climate response are simplified."
references:
  - url: "https://www.ipcc.ch/report/ar6/wg1/chapter/chapter-8/"
    title: "IPCC AR6 WG1 Chapter 8: Water Cycle Changes"
    claim: "Atmospheric moisture-holding capacity scales at approximately 7% per degree C."
  - url: "https://www.ipcc.ch/report/ar6/wg1/chapter/chapter-11/"
    title: "IPCC AR6 WG1 Chapter 11: Weather and Climate Extreme Events"
    claim: "Heavy precipitation intensity/frequency has increased in many regions and is projected to continue increasing."
  - url: "https://repository.up.ac.za/bitstream/handle/2263/88622/McBride_Changes_2022.pdf?sequence=1"
    title: "McBride et al. (2022) Changes in extreme daily rainfall characteristics in South Africa"
    claim: "Later-period South African rainfall return levels are frequently higher than earlier periods."
  - url: "https://www.wrc.org.za/wp-content/uploads/mdocs/TT%20921%20final%20web.pdf"
    title: "WRC TT 921/23 Design Flood Estimation Guideline"
    claim: "Interim climate allowances (including around 15% and wider ranges) are recommended for design practice."
  - url: "https://www.dws.gov.za/iwrp/uMkhomazi/Documents/Module%201/2/P%20WMA%2011_U10_00_3312_3_1_11%20-%20Climate%20Change_FINAL.pdf"
    title: "DWS Climate Change Assessment Example"
    claim: "South African planning studies have applied around 30% design flood peak increases in future horizons."
